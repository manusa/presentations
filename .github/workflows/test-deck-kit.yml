name: deck-kit tests

on:
  pull_request:
    paths:
      - 'static/deck-kit/**'
      - 'static/presentations/**'
      - 'tests/deck-kit/**'
      - 'tests/highlight/**'
      - 'tests/fontawesome/**'
      - 'scripts/lib/deck.js'
      - 'scripts/vendor-highlight.js'
      - 'scripts/vendor-fontawesome.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test-deck-kit.yml'
  push:
    branches: [main]

# Cancel in-flight runs on PR push so we don't queue stale results.
# Do NOT cancel runs on `main` — a canceled push run records as a
# non-success status, which can surface as a red required check on
# the next PR.
concurrency:
  group: test-deck-kit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      - run: npm run test:deck-kit

      # Build-less syntax highlighting (issue #59) — per-deck glue, not part of
      # the frozen deck-kit contract, but gated in this same required job so a
      # highlight/vendoring regression can't merge green.
      - name: Verify vendored highlight.js integrity (offline, no network)
        run: npm run vendor:highlight -- --verify
      - run: npm run test:highlight

      # Vendored Font Awesome (issue #67) — shared deck-kit infra, not part of the
      # frozen deck-kit JS contract, but gated in this same required job so a
      # corrupted vendored file, a missing webfont, or a re-introduced CDN <link>
      # can't merge green.
      - name: Verify vendored Font Awesome integrity (offline, no network)
        run: npm run vendor:fontawesome -- --verify
      - run: npm run test:fontawesome
