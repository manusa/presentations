name: deck-kit tests

on:
  pull_request:
    paths:
      - 'static/deck-kit/**'
      - 'static/presentations/**'
      - 'tests/deck-kit/**'
      - 'tests/highlight/**'
      - 'tests/vendor/**'
      - 'scripts/lib/deck.js'
      - 'scripts/lib/vendor.js'
      - 'scripts/lib/fontsource-css.js'
      - 'scripts/vendor.js'
      - 'scripts/vendor.manifest.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test-deck-kit.yml'
  push:
    branches: [main]

# Cancel in-flight runs on PR push so we don't queue stale results.
# Do NOT cancel runs on `main` — a canceled push run records as a
# non-success status, which can surface as a red required check on
# the next PR.
concurrency:
  group: test-deck-kit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      - run: npm run test:deck-kit

      # Vendored third-party libraries (issue #68) — Font Awesome, highlight.js,
      # and the self-hosted Google Fonts, all driven by scripts/vendor.manifest.js.
      # Not part of the frozen deck-kit JS contract, but gated in this same
      # required job so a corrupted vendored file, a re-introduced CDN reference,
      # or a missing asset can't merge green. A NEW vendored library needs no edit
      # here — its manifest entry is picked up by both steps automatically.
      - name: Verify all vendored libraries' integrity (offline, no network)
        run: npm run vendor -- --verify
      - run: npm run test:vendor

      # highlight.js behavioural suite (issue #59) — drives a real browser over
      # the vendored engine + grammars; stays separate from the declarative
      # posture spec above.
      - run: npm run test:highlight
