name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  npm:
    name: NPM Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
      - name: Replace dependencies
        run: |
          # Allow public static pages in npm package
          echo "" > .gitignore
          # Leave only runtime dependencies
          ./replaceDependencies.sh
      - name: Publish
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PKG}@${VER}" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "::notice::${PKG}@${VER} is already published — skipping publish"
            exit 0
          fi
          npm publish --provenance --access public
